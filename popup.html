<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            width: 300px;
            padding: 10px;
            font-family: Arial;
        }
        textarea {
            width: 100%;
            height: 150px;
            margin-bottom: 10px;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h3>Firefly Batch Prompter</h3>

    <textarea id="prompts" placeholder="Enter prompts, one per line"></textarea>
    <div id="progress-box" style="
    margin-top:10px;
    padding:8px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:12px;
    max-height:120px;
    overflow-y:auto;
        ">
    <b>Progress:</b>
    <div id="progress-log"></div>
    </div>


    <button id="run">Run Batch</button>
    <label style="display:flex;align-items:center;gap:6px;margin-top:8px;">
    <input type="checkbox" id="autoDownload">
    Auto-download hasil setiap prompt
    </label>


    <script src="popup.js"></script>
</body>
</html>
